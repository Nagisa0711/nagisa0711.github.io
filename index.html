<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音源配布サイト</title>
  <link rel="stylesheet" href="style.css" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9991340076627705"
     crossorigin="anonymous"></script>
</head>
<body>
  <header class="topbar">
    <h1>音源配布サイト</h1>
    <p>ハッシュタグ検索 / 最新欄 / カテゴリ別表示</p>
  </header>

  <main class="container">
    <section class="search-box">
      <input
        type="text"
        id="searchInput"
        placeholder="検索 例: #紙 #破る #捲る"
      />
    </section>

    <section class="section-block">
      <div class="section-title-row">
        <h2>最新欄</h2>
        <span class="section-sub">最新の音源がここに表示されます</span>
      </div>
      <div id="latestList" class="card-grid"></div>
    </section>

    <section class="section-block">
      <div class="section-title-row">
        <h2>カテゴリ別</h2>
        <span class="section-sub">分類済みの音源</span>
      </div>
      <div id="categorySections"></div>
    </section>
    <section class="section-block">
  <div class="section-title-row">
    <h2>お問い合わせ</h2>
    <span class="section-sub">ご連絡はこちらから</span>
  </div>

  <form id="contact-form">
    <input type="text" name="user_name" placeholder="名前" required />
    <br><br>
    <input type="email" name="user_email" placeholder="メールアドレス" required />
    <br><br>
    <textarea name="message" placeholder="内容" required></textarea>
    <br><br>
    <button type="submit">送信</button>
  </form>
</section>
    
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>

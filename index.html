<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Sound Library</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
    }

    h2 {
      border-bottom: 1px solid #444;
      padding-bottom: 5px;
      margin-top: 40px;
    }

    .sound {
      margin: 15px 0;
      padding: 10px;
      background: #1a1a1a;
      border-radius: 8px;
    }

    audio {
      width: 100%;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <h1>Free Sound Library</h1>

  <!-- ペン -->
  <h2>Pen</h2>

  <div class="sound">
    <p>Write</p>
    <audio controls src="./audio/stationery/pen/write.wav"></audio>
  </div>

  <div class="sound">
    <p>Write 2</p>
    <audio controls src="./audio/stationery/pen/write2.wav"></audio>
  </div>

  <div class="sound">
    <p>Pen Click</p>
    <audio controls src="./audio/stationery/pen/pen-clicking.wav"></audio>
  </div>

  <div class="sound">
    <p>Pen Click 2</p>
    <audio controls src="./audio/stationery/pen/pen-clicking-2.wav"></audio>
  </div>


  <!-- 紙 -->
  <h2>Paper</h2>

  <div class="sound">
    <p>Turn Page</p>
    <audio controls src="./audio/stationery/paper/turn-the-page.wav"></audio>
  </div>

  <div class="sound">
    <p>Turn Page 2</p>
    <audio controls src="./audio/stationery/paper/turn-the-page-2.wav"></audio>
  </div>

  <div class="sound">
    <p>Tear Paper</p>
    <audio controls src="./audio/stationery/paper/tear-paper.wav"></audio>
  </div>

  <div class="sound">
    <p>Tear Paper 2</p>
    <audio controls src="./audio/stationery/paper/tear-paper-2.wav"></audio>
  </div>

  <div class="sound">
    <p>Tear Paper 3</p>
    <audio controls src="./audio/stationery/paper/tear-paper-3.wav"></audio>
  </div>

  <div class="sound">
    <p>Roll Paper</p>
    <audio controls src="./audio/stationery/paper/roll-up-paper.wav"></audio>
  </div>


  <!-- その他 -->
  <h2>Other</h2>

  <div class="sound">
    <p>Digging Case</p>
    <audio controls src="./audio/stationery/other/diggin-for-a-pen.wav"></audio>
  </div>

  <div class="sound">
    <p>Digging Case 2</p>
    <audio controls src="./audio/stationery/other/diggin-for-a-pen-2.wav"></audio>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音源配布サイト</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>音源配布サイト</h1>
    <p>ハッシュタグ検索 / 最新欄 / カテゴリ別表示</p>
  </header>

  <main class="container">
    <section class="search-box">
      <input
        type="text"
        id="searchInput"
        placeholder="検索 例: #紙 #破る #捲る"
      />
    </section>

    <section class="section-block">
      <div class="section-title-row">
        <h2>最新欄</h2>
        <span class="section-sub">最新の音源がここに表示されます</span>
      </div>
      <div id="latestList" class="card-grid"></div>
    </section>

    <section class="section-block">
      <div class="section-title-row">
        <h2>カテゴリ別</h2>
        <span class="section-sub">分類済みの音源</span>
      </div>
      <div id="categorySections"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>

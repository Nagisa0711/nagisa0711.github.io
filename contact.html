<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お問い合わせ</title>
</head>
<body>
  <h1>お問い合わせ</h1>

  <form id="contact-form">
    <input type="text" name="user_name" placeholder="名前" required />
    <br><br>
    <input type="email" name="user_email" placeholder="メールアドレス" required />
    <br><br>
    <textarea name="message" placeholder="内容" required></textarea>
    <br><br>
    <button type="submit">送信</button>
  </form>

  <p id="result"></p>

  <script type="module">
    import emailjs from 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/+esm';

    emailjs.init({
      publicKey: 'YOUR_PUBLIC_KEY'
    });

    const form = document.getElementById('contact-form');
    const result = document.getElementById('result');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      try {
        await emailjs.sendForm(
          'YOUR_SERVICE_ID',
          'YOUR_TEMPLATE_ID',
          form
        );

        result.textContent = '送信しました';
        form.reset();
      } catch (error) {
        console.error(error);
        result.textContent = '送信に失敗しました';
      }
    });
  </script>
</body>
</html>
